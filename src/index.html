    (() => {
      try {
        const theme = localStorage.getItem('portfolio-theme-v2');
        const language = localStorage.getItem('portfolio-language-v2');
        const root = document.documentElement;

        root.classList.toggle('dark', theme === 'dark');

        if (language === 'ar') {
          root.lang = 'ar';
          root.dir = 'rtl';
        } else {
          root.lang = 'en';
          root.dir = 'ltr';
        }

    })();
