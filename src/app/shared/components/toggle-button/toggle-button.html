<button
  type="button"
  class="inline-flex min-h-9 items-center justify-center rounded-lg border px-3 text-xs font-semibold tracking-[0.02em] transition-[background-color,border-color,color,transform] duration-[var(--duration-fast)] ease-[var(--ease-out)] active:scale-[0.97]"
  [class.border-[var(--accent)]]="active()"
  [class.bg-[var(--accent-soft)]]="active()"
  [class.text-[var(--text)]]="active()"
  [class.border-[var(--border)]]="!active()"
  [class.bg-[var(--surface)]]="!active()"
  [class.text-[var(--muted)]]="!active()"
  [attr.aria-pressed]="active()"
  (click)="toggleClick.emit()"
>
  {{ label() }}
</button>
