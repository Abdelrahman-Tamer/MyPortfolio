<article class="skill-card">
  <div class="skill-glow" aria-hidden="true"></div>

  <header class="skill-card-header">
    <div
      class="skill-mark"
      [class.mark-code]="mark() === 'code'"
      [class.mark-ng]="mark() === 'ng'"
      [class.mark-style]="mark() === 'style'"
      [class.mark-api]="mark() === 'api'"
      [class.mark-tool]="mark() === 'tool'"
      aria-hidden="true"
    >
      @switch (mark()) {
        @case ('code') {
          <app-icon name="code" [size]="18" />
        }
        @case ('ng') {
          <app-icon name="layers" [size]="18" />
        }
        @case ('style') {
          <app-icon name="palette" [size]="18" />
        }
        @case ('api') {
          <app-icon name="database" [size]="18" />
        }
        @default {
          <app-icon name="wrench" [size]="18" />
        }
      }
    </div>

    <h3>{{ title() }}</h3>
  </header>

  <div class="skill-chip-list">
    @for (item of category().items; track item) {
      <span dir="ltr">{{ item }}</span>
    }
  </div>
</article>
