<div class="portfolio-root">
  <div class="portfolio-grid-bg" aria-hidden="true"></div>

  <div class="portfolio-content">
    <a class="skip-link" href="#main-content">Skip to content</a>
    <app-navbar />
    <main id="main-content" tabindex="-1">
      <app-hero id="home" />
      @defer (on idle) {
        <app-stats />
        <app-about id="about" />
        <app-services id="services" />
        <app-projects id="projects" />
        <app-skills id="skills" />
        <app-process />
        <app-contact id="contact" />
      }
    </main>
    @defer (on idle) {
      <app-footer />
    }
  </div>

  <aside aria-label="Quick contact">
    <a
      class="whatsapp-float"
      [class.is-hidden]="whatsappHidden()"
      [href]="whatsappHref"
      target="_blank"
      rel="noopener noreferrer"
      [attr.aria-label]="text(whatsappLabel)"
    >
      <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
        <path
          d="M20.52 3.48A11.84 11.84 0 0 0 12.06 0C5.48 0 .12 5.34.12 11.91c0 2.1.55 4.15 1.59 5.96L0 24l6.28-1.65a11.9 11.9 0 0 0 5.78 1.47h.01c6.57 0 11.93-5.34 11.93-11.91 0-3.18-1.24-6.17-3.48-8.43Zm-8.45 18.32h-.01a9.9 9.9 0 0 1-5.04-1.38l-.36-.21-3.72.98.99-3.63-.23-.37a9.86 9.86 0 0 1-1.51-5.28c0-5.45 4.44-9.89 9.9-9.89a9.82 9.82 0 0 1 6.99 2.9 9.8 9.8 0 0 1 2.89 6.99c0 5.45-4.44 9.89-9.9 9.89Zm5.43-7.4c-.3-.15-1.76-.87-2.03-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.64.07-.3-.15-1.25-.46-2.38-1.47-.88-.78-1.47-1.75-1.64-2.04-.17-.3-.02-.46.13-.61.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.08-.15-.67-1.61-.92-2.2-.24-.58-.49-.5-.67-.51h-.57c-.2 0-.52.07-.79.37-.27.3-1.04 1.02-1.04 2.48s1.07 2.87 1.22 3.07c.15.2 2.1 3.2 5.08 4.49.71.31 1.26.49 1.69.63.71.23 1.36.2 1.87.12.57-.09 1.76-.72 2.01-1.41.25-.7.25-1.29.17-1.41-.07-.13-.27-.2-.57-.35Z"
        />
      </svg>
    </a>
  </aside>
</div>
