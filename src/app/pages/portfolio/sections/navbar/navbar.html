<nav class="figma-nav" aria-label="Primary navigation" [class.is-solid]="scrolled() || menuOpen()">
  <div class="container figma-nav-inner">
    <button type="button" class="figma-logo" aria-label="Home" dir="ltr" (click)="navigateToSection('home')">
      AE<span>.</span>
    </button>

    <div class="nav-links">
      @for (link of navLinks(); track link.id) {
        <a
          routerLink="/"
          [fragment]="link.id"
          class="figma-nav-link"
          [class.is-active]="activeSection() === link.id"
          [attr.aria-current]="activeSection() === link.id ? 'location' : null"
          (click)="closeMenu()"
        >
          {{ text(link.label) }}
          @if (activeSection() === link.id) {
            <span class="nav-dot" aria-hidden="true"></span>
          }
        </a>
      }
    </div>

    <div class="figma-nav-actions">
      <a class="nav-cv-link" routerLink="/cv">
        {{ cvLabel() }}
      </a>
      <a class="nav-hire-link" routerLink="/" fragment="contact" (click)="closeMenu()">
        {{ hireMeLabel() }}
      </a>
      <span class="nav-divider" aria-hidden="true"></span>
      <button
        type="button"
        class="language-orb-button"
        [attr.aria-label]="languageToggleLabel()"
        (click)="toggleLanguage()"
      >
        {{ languageToggleText() }}
      </button>

      <button
        type="button"
        class="theme-icon-button"
        [attr.aria-label]="themeService.isDark() ? 'Switch to light theme' : 'Switch to dark theme'"
        (click)="themeService.toggleTheme()"
      >
        @if (themeService.isDark()) {
          <app-icon name="sun" [size]="17" />
        } @else {
          <app-icon name="moon" [size]="17" />
        }
      </button>

      <button
        #burgerButton
        type="button"
        class="nav-burger"
        [attr.aria-expanded]="menuOpen()"
        aria-controls="portfolio-mobile-menu"
        [attr.aria-label]="menuLabel()"
        (click)="toggleMenu()"
      >
        @if (menuOpen()) {
          <app-icon name="x" [size]="18" />
        } @else {
          <app-icon name="menu" [size]="18" />
        }
      </button>
    </div>
  </div>

  @if (menuOpen()) {
    <div
      #mobilePanel
      class="nav-mobile-panel"
      id="portfolio-mobile-menu"
      aria-label="Mobile navigation"
      (keydown.escape)="closeMenu()"
      (keydown.tab)="trapMobileMenuFocus($event)"
    >
      <div class="container nav-mobile-inner">
        @for (link of navLinks(); track link.id) {
          <a
            routerLink="/"
            [fragment]="link.id"
            class="mobile-nav-link"
            [class.is-active]="activeSection() === link.id"
            [attr.aria-current]="activeSection() === link.id ? 'location' : null"
            (click)="closeMenu(false)"
          >
            {{ text(link.label) }}
          </a>
        }
        <a class="mobile-cv-link" routerLink="/cv" (click)="closeMenu(false)">
          {{ cvLabel() }}
        </a>
        <a class="mobile-hire-link" routerLink="/" fragment="contact" (click)="closeMenu(false)">
          {{ hireMeLabel() }}
        </a>
      </div>
    </div>
  }
</nav>
