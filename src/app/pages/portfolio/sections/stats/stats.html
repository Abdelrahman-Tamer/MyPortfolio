<section class="container stats-container" aria-label="Portfolio trust signals">
  <div class="resp-stats">
    @for (stat of stats; track stat.id) {
      <article class="stat-cell">
        <div class="stat-mark" aria-hidden="true">
          <app-icon [name]="statVisuals[$index].icon" [size]="24" />
        </div>
        <div class="stat-copy">
          <p class="stat-label">{{ text(stat.label) }}</p>
          <p>{{ text(stat.detail) }}</p>
        </div>
      </article>
    }
  </div>
</section>
